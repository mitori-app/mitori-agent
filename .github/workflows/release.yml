name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
          # macOS
          - os: darwin
            arch: amd64
            goos: darwin
            goarch: amd64
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
          # Windows
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Generate protobuf code
        run: |
          cd proto
          bash generate.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          OUTPUT_NAME="mitori-agent-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${OUTPUT_NAME}" \
            ./cmd/agent

          cd dist
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mitori-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/mitori-agent-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            dist/mitori-agent-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## Mitori Agent ${VERSION}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Linux/macOS:**" >> $GITHUB_OUTPUT
          echo '```bash' >> $GITHUB_OUTPUT
          echo "curl -sSL https://raw.githubusercontent.com/mitori-app/mitori-agent/${VERSION}/install.sh | bash" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Windows (PowerShell as Administrator):**" >> $GITHUB_OUTPUT
          echo '```powershell' >> $GITHUB_OUTPUT
          echo "irm https://raw.githubusercontent.com/mitori-app/mitori-agent/${VERSION}/install.ps1 | iex" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Checksums" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          cat dist/*.sha256 >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: false
